name: Continuous Integration
on: 
  pull_request:
    branches: 
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Continuous Integrations
        uses: advanced-security/python-lint-code-scanning-action@v1.1.3
        with:
          linter: pylint
